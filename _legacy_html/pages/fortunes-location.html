<section class="s">

    <div class="section-head">
      <span class="eyebrow">L O C A T I O N</span>

      <p>今いる場所との相性を読み、心地よい行動方位をお届けします。</p>

    <form class="form-card" data-demo="fortune" data-type="location">
      <div class="form-row">

        <select required>
          <option value="">選択してください</option>

          <option>九州エリア</option><option>沖縄県</option>
        </select>
      </div>
      <div class="form-row">
        <label>市区町村 <span class="muted">（任意）</span></label>
        <input type="text" placeholder="例：港区">
      </div>
      <div class="form-row">
        <label>テーマ</label>
        <div class="theme-row">
          <span class="theme-chip active">総合</span>
          <span class="theme-chip">引っ越し</span>
          <span class="theme-chip">旅行</span>
          <span class="theme-chip">仕事</span>
          <span class="theme-chip">恋愛</span>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">場所との相性を読む</button>
