</head>
<body>
<div class="starfield"></div>

<header class="site-header">
  <div class="container inner">
    <a class="brand" href="../index.html"><span class="logo-mark">✦</span><span>星結びの占い<small>HOSHI MUSUBI</small></span></a>
    <nav class="nav">

</header>

<section class="s">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">M Y   P A G E</span>
      <h2>こんにちは、星野さん</h2>
      <p>あなたの占い履歴とプラン状況です。</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 26px; max-width: 1000px; margin: 0 auto;">
      <div class="result-body" style="margin: 0;">
        <h3>プラン</h3>
        <p style="font-family: 'Noto Serif JP', serif; font-size: 28px; margin: 8px 0;">Free</p>
        <p class="muted" style="font-size: 12px;">登録：2026/05/01</p>
        <a class="btn btn-gold btn-block" href="pricing.html" style="margin-top: 16px;">👑 プレミアムに変更</a>
      </div>

      <div class="result-body" style="margin: 0;">
        <h3>占い履歴</h3>
        <div style="display: grid; gap: 12px; margin-top: 14px;">
          <a class="fortune-card" href="result.html" style="padding: 18px 20px; flex-direction: row; align-items: center; gap: 14px;">
            <div class="icon" style="width: 44px; height: 44px; font-size: 22px;">🤚</div>
            <div style="flex: 1;">
              <h3 style="font-size: 15px; margin: 0;">手相占い - 変化の入口にいます</h3>
              <p style="font-size: 12px; margin: 4px 0 0;" class="muted">2026/05/06</p>
            </div>
            <span class="more">→</span>
          </a>
          <a class="fortune-card" href="result.html" style="padding: 18px 20px; flex-direction: row; align-items: center; gap: 14px;">
            <div class="icon" style="width: 44px; height: 44px; font-size: 22px;">🎂</div>
            <div style="flex: 1;">
              <h3 style="font-size: 15px; margin: 0;">生年月日占い - 静かな再起動</h3>
              <p style="font-size: 12px; margin: 4px 0 0;" class="muted">2026/05/03</p>
            </div>
            <span class="more">→</span>
          </a>
          <a class="fortune-card" href="result.html" style="padding: 18px 20px; flex-direction: row; align-items: center; gap: 14px;">
            <div class="icon" style="width: 44px; height: 44px; font-size: 22px;">📜</div>
            <div style="flex: 1;">
              <h3 style="font-size: 15px; margin: 0;">名前占い - 響きが結ぶ縁</h3>
              <p style="font-size: 12px; margin: 4px 0 0;" class="muted">2026/04/29</p>
            </div>
            <span class="more">→</span>
          </a>
        </div>
      </div>
    </div>

    <div style="max-width: 1000px; margin: 30px auto 0;">
      <div class="result-body" style="margin: 0;">
        <h3>プロフィール</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 14px;">
          <div class="form-row" style="margin: 0;">
            <label>表示名</label>
            <input type="text" value="星野 結">
          </div>
          <div class="form-row" style="margin: 0;">
            <label>生年月日</label>
            <input type="date" value="1995-04-12">
          </div>
          <div class="form-row" style="margin: 0;">
            <label>居住地</label>
            <select><option>東京都</option></select>
          </div>
          <div class="form-row" style="margin: 0;">
            <label>メール</label>
            <input type="email" value="example@hoshi.jp">
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top: 18px;">変更を保存</button>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
